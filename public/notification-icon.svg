<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!--
    Notification LARGE icon — shown on the right side of the
    notification card in the Android shade. Same phoenix silhouette
    as notification-badge.svg, but with the brand-red background
    behind it so it reads as the Outrank icon (matches the way
    Threads / WhatsApp / Twitter render their notification icons
    with their brand colors).
  -->

  <!-- Solid red background. Square (not circle) — Android crops it to
       its preferred shape (circle on most launchers, rounded square on
       some). Keeping it square + edge-to-edge means whichever crop the
       OS picks, the background still fills the visible area. -->
  <rect width="96" height="96" fill="#dc2626"/>

  <!-- White phoenix silhouette, scaled down ~85% from the badge so
       there's a comfortable inset around the bird inside the red disc. -->
  <g fill="#ffffff" transform="translate(7.2 7.2) scale(0.85)">
    <!-- Upper (back) wings -->
    <path d="M39 42 C 33 39 24 33 15 27 C 9 24 3 24 3 24 C 3 24 12 33 21 39 C 30 45 36 45 39 42 Z"/>
    <path d="M57 42 C 63 39 72 33 81 27 C 87 24 93 24 93 24 C 93 24 84 33 75 39 C 66 45 60 45 57 42 Z"/>
    <!-- Lower (front) wings -->
    <path d="M42 54 C 36 51 27 45 18 42 C 12 40.5 6 42 6 42 C 6 42 15 48 24 51 C 33 54 39 55.5 42 54 Z"/>
    <path d="M54 54 C 60 51 69 45 78 42 C 84 40.5 90 42 90 42 C 90 42 81 48 72 51 C 63 54 57 55.5 54 54 Z"/>
    <!-- Body flame -->
    <path d="M48 12 C 48 12 39 21 36 33 C 33 45 36 51 42 54 C 39 48 39 39 42 30 C 45 21 48 18 48 18 C 48 18 51 21 54 30 C 57 39 57 48 54 54 C 60 51 63 45 60 33 C 57 21 48 12 48 12 Z"/>
    <!-- Tail -->
    <path d="M48 54 C 45 60 42 72 42 81 C 42 87 45 90 48 90 C 51 90 54 87 54 81 C 54 72 51 60 48 54 Z"/>
  </g>
</svg>
