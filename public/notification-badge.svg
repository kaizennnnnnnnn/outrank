<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="#ffffff">
  <!--
    Notification small-icon / badge for Android & PWA.
    Android renders the badge by using ONLY the alpha channel — the
    OS replaces every non-transparent pixel with its system color.
    So this MUST stay a white-on-transparent silhouette.

    Just the bob haircut from the app icon — no face, no neck, no
    shoulders. A clean helmet/dome shape so it reads as a hair mass
    at the 18-32px sizes Android renders badges at. Slight flair at
    the bottom corners gives the bob its character.
  -->
  <path d="
    M 48 12
    C 27 12 18 24 18 42
    L 18 58
    C 18 67 22 72 30 72
    C 33 72 35 70 35 67
    L 35 63
    L 61 63
    L 61 67
    C 61 70 63 72 66 72
    C 74 72 78 67 78 58
    L 78 42
    C 78 24 69 12 48 12
    Z
  "/>
</svg>
