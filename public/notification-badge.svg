<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="#ffffff">
  <!--
    Notification small-icon / badge for Android & PWA.
    Android renders the badge by using ONLY the alpha channel — the
    OS replaces every non-transparent pixel with its system color.
    So this MUST stay a white-on-transparent silhouette.

    Side-profile bob silhouette. Character faces right (front of the
    head and bangs on the right edge of the badge, back of the bob
    on the left). Just the hair mass — no face, neck, or shoulders.
  -->
  <path d="
    M 46 14
    C 30 16 18 30 18 46
    L 18 56
    C 18 64 22 70 30 70
    C 36 70 40 66 40 60
    L 40 56
    C 40 52 42 50 46 50
    L 52 50
    C 62 48 70 42 74 32
    C 78 22 72 14 60 14
    L 46 14
    Z
    M 60 30
    C 64 30 68 28 70 24
    L 70 36
    C 68 38 64 38 60 36
    Z
  "/>
</svg>
